
server:
  # 端口号设置
  port: 8083
  servlet:
    context-path: /bbs-server
spring:
  #加载配置文件
  profiles:
    active: dev
  # 时间格式设置
  jackson:
    time-zone: GMT+8
  # 避免Spring Boot 2.6.0以后新特性默认禁止循环引用
  main:
    allow-circular-references: true

  # 不急于创建数据库连接——让 DatabaseInitializer 先建库
  datasource:
    druid:
      initial-size: 0
      min-idle: 0
      max-active: 20
      test-on-borrow: false
      connection-error-retry-attempts: 0
      break-after-acquire-failure: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      location: C:/tmp/bbs-upload

# Mybatis-plus 设置
mybatis-plus:
  # 配置Mybatis映射文件
  mapper-locations: classpath:mapper/*.xml
  # 配置Mybatis数据返回类型别名（默认别名是类名）
  type-aliases-package: com.walker.pojo
  global-config:
    db-config:
      table-prefix: bbs_

# JWT 配置

jwt:
  # JWT 存储的请求头
  tokenHeader: Authorization
  # JWT 加密使用的密钥
  secret: bbs-secret
  # JWT 的超时期限时间（60*60*24）
  expiration: 604800
  # JWT 负载中拿到开头
  tokenHead: Bearer

# ============================================
# 数据库初始化配置
# ============================================
bbs:
  init:
    super-admin:
      username: asiayak
      # 超级管理员密码（生产环境请通过环境变量 BBS_SUPER_ADMIN_PASSWORD 覆盖）
      password: ${BBS_SUPER_ADMIN_PASSWORD:1234@abcD}

