spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:postgresql://${BBS_DB_HOST:127.0.0.1}:${BBS_DB_PORT:5432}/${BBS_DB_NAME:bbs}
    username: ${BBS_DB_USER:work_flow}
    password: ${BBS_DB_PASSWORD}
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 20
      test-on-borrow: true
      validation-query: SELECT 1
      stat-view-servlet:
        allow: true

# 文件存储路径（保持与原来一致）
storage:
  path: ${BBS_UPLOAD_DIR:/data/bbs/bbsUpload/}
