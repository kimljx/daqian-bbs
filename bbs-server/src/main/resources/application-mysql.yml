spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://${BBS_DB_HOST:bbs-mysql}:${BBS_DB_PORT:3306}/${BBS_DB_NAME:bbs}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: ${BBS_DB_USER:work_flow}
    password: ${BBS_DB_PASSWORD}
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 20
      test-on-borrow: true
      validation-query: SELECT 1
      stat-view-servlet:
        allow: true
  servlet:
    multipart:
      # 容器环境必须用 Linux 路径（覆盖 application.yml 中的 Windows 路径）
      location: ${BBS_UPLOAD_TEMP:/tmp/bbs-upload}

# 文件存储路径（保持与原来一致）
storage:
  path: ${BBS_UPLOAD_DIR:/data/bbs/bbsUpload/}
